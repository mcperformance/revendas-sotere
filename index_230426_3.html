<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Revendas | Sotere Negócios Imobiliários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        
        .navbar { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            padding: 20px 0;
        }
        
        .hero-section {
            position: relative;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.7)), 
                        url('https://www.construtorapatriani.com.br/_next/image?url=https%3A%2F%2Fd1l3zvrqp603kj.cloudfront.net%2F03_P_SP_FACHADA_VOO_DE_PASSARO_min_9b0ddc5155.jpg&w=1920&q=85');
            background-size: cover;
            background-position: center;
            min-height: 500px;
            display: flex;
            align-items: center;
            color: white;
            padding-top: 80px;
        }

        .card-summary { transition: all 0.3s ease; border-radius: 2rem; border: 1px solid #e2e8f0; background: white; height: 100%; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
        .card-summary:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-blur { backdrop-filter: blur(12px); background-color: rgba(15, 23, 42, 0.7); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        tr:hover td { background-color: #f1f5f9 !important; cursor: pointer; }

        @media (max-width: 768px) {
            .hero-section { min-height: 400px; text-align: center; }
            .hero-section h1 { font-size: 2.2rem; }
            .hero-section .h-1 { margin: 0 auto 1.5rem; }
            .navbar .container { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <img src="https://sotereimoveis.com.br/wp-content/themes/itm/assets/img/logo/logo-sotere-dark.svg" alt="Sotere Logo" class="h-12 md:h-16">
        
        <div class="flex items-center gap-2 bg-black/30 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
            <span id="total-geral" class="text-white font-bold text-[10px] md:text-xs uppercase tracking-wider">Carregando estoque...</span>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container mx-auto px-6">
        <div class="max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 leading-tight uppercase">Portal de Revendas <span class="text-blue-400">Patriani</span></h1>
            <div class="h-1 w-24 bg-blue-500 mb-6"></div>
            <p class="text-lg md:text-2xl font-light text-slate-100">
                Oportunidades exclusivas com <br class="hidden md:block">
                <strong class="font-bold text-white border-b-2 border-blue-500 uppercase">gestão estratégica e curadoria da Sotere.</strong>
            </p>
        </div>
    </div>
</section>

<main class="container mx-auto px-6 -mt-12 md:-mt-20 relative z-10">
    <section class="bg-white p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 shadow-2xl space-y-6 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="md:col-span-12 relative">
                <input type="text" id="busca-global" oninput="aplicarFiltros()" placeholder="Pesquise por nome, cidade ou construtora..." 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-600 text-sm rounded-2xl p-4 pl-12 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all font-medium">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            
            <div class="md:col-span-3">
                <select id="filtra-empreendimento" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Empreendimento</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <select id="filtro-construtora" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Construtora</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <select id="filtro-cidade" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Cidade</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <button onclick="resetarVista()" class="w-full h-full py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                    Limpar Filtros
                </button>
            </div>
        </div>
    </section>

    <div id="view-container"></div>
</main>

<div id="modal-detalhes" class="hidden fixed inset-0 z-[60] modal-blur flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-5xl max-h-[90vh] overflow-hidden rounded-[2.5rem] shadow-2xl relative">
        <button onclick="fecharModal()" class="absolute top-4 right-4 md:top-8 md:right-8 z-50 bg-white/80 backdrop-blur-md rounded-full p-2 shadow-lg hover:bg-slate-200 transition">
            <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div id="conteudo-modal" class="overflow-y-auto custom-scrollbar h-full"></div>
    </div>
</div>

<script>
    const LINK_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6x_M0N6qfI9-W3mS00jG0XWv12xU8W68Pq-2lO2F8W68Pq-2lO2F8W68Pq/pub?output=csv'; 
    let todosImoveis = [];

    function carregarDados() {
        Papa.parse(LINK_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(r) {
                todosImoveis = r.data.filter(i => i.Empreendimento);
                document.getElementById('total-geral').innerText = `${todosImoveis.length} Unidades em Estoque`;
                popularFiltros();
                renderizarSumario(todosImoveis);
            }
        });
    }

    function popularFiltros() {
        const fEmp = document.getElementById('filtra-empreendimento');
        const fCons = document.getElementById('filtro-construtora');
        const fCid = document.getElementById('filtro-cidade');

        const nomes = [...new Set(todosImoveis.map(i => i.Empreendimento))].sort();
        const construtoras = [...new Set(todosImoveis.map(i => i.Construtora))].sort();
        const cidades = [...new Set(todosImoveis.map(i => i.Cidade))].sort();

        nomes.forEach(n => fEmp.innerHTML += `<option value="${n}">${n}</option>`);
        construtoras.forEach(c => fCons.innerHTML += `<option value="${c}">${c}</option>`);
        cidades.forEach(cid => fCid.innerHTML += `<option value="${cid}">${cid}</option>`);
    }

    function formatarNumero(str) {
        if (!str || str.trim() === "" || str.includes("---")) return null;
        const num = parseFloat(str.replace(/[^\d]/g, '')) / 100;
        return isNaN(num) ? null : num;
    }

    function renderizarSumario(items) {
        const container = document.getElementById('view-container');
        const agrupado = items.reduce((acc, curr) => {
            if (!acc[curr.Empreendimento]) {
                acc[curr.Empreendimento] = {
                    nome: curr.Empreendimento,
                    construtora: curr.Construtora,
                    cidade: curr.Cidade,
                    foto: curr['Foto Empreendimento'],
                    precos: [],
                    plantas: new Set(),
                    total: 0
                };
            }
            const valor = formatarNumero(curr['Valor Total']);
            if (valor !== null) acc[curr.Empreendimento].precos.push(valor);
            if (curr.Metragem) acc[curr.Empreendimento].plantas.add(curr.Metragem + 'm²');
            acc[curr.Empreendimento].total++;
            return acc;
        }, {});

        container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8";
        container.innerHTML = Object.values(agrupado).map(p => {
            const temPreco = p.precos.length > 0;
            const min = temPreco ? Math.min(...p.precos).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }) : "Sob Consulta";
            const max = temPreco ? Math.max(...p.precos).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }) : "";
            const faixa = (max && max !== min) ? `${min} a ${max}` : min;

            return `
            <div class="card-summary" onclick="verUnidades('${p.nome}')">
                <div class="h-48 bg-cover bg-center" style="background-image: url('${p.foto}')"></div>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[8px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase">${p.construtora}</span>
                        <span class="text-slate-400 text-[10px] font-bold">${p.total} Unid.</span>
                    </div>
                    <h3 class="text-lg font-extrabold text-slate-800 leading-tight mb-1 uppercase">${p.nome}</h3>
                    <p class="text-slate-400 text-[10px] font-medium mb-4 uppercase tracking-wider">${p.cidade}</p>
                    <div class="mt-auto pt-4 border-t border-slate-50 space-y-3">
                        <div>
                            <p class="text-[8px] font-bold text-slate-300 uppercase mb-1">Plantas</p>
                            <p class="text-xs font-bold text-slate-600">${Array.from(p.plantas).sort().join(' | ')}</p>
                        </div>
                        <div>
                            <p class="text-[8px] font-bold text-slate-300 uppercase mb-1">Valor Total</p>
                            <p class="text-sm font-extrabold text-slate-800">${faixa}</p>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function verUnidades(nome) {
        const filtrados = todosImoveis.filter(i => i.Empreendimento === nome);
        const container = document.getElementById('view-container');
        container.className = "bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden";
        container.innerHTML = `
            <div class="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h2 class="text-lg md:text-xl font-extrabold text-slate-800 uppercase">${nome}</h2>
                <button onclick="resetarVista()" class="text-blue-600 text-[10px] font-black uppercase tracking-widest">← Voltar</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="p-6">Unidade</th>
                            <th class="p-6">Andar</th>
                            <th class="p-6">Planta</th>
                            <th class="p-6">Previsão Entrega</th>
                            <th class="p-6">Valor Total</th>
                            <th class="p-6 text-center">Ficha</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtrados.map(i => `
                            <tr class="border-b border-slate-50" onclick='abrirFicha(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
                                <td class="p-6 font-bold text-slate-700">${i.Unidade}</td>
                                <td class="p-6 text-slate-500">${i.Andar}º</td>
                                <td class="p-6 text-slate-500">${i.Metragem}m²</td>
                                <td class="p-6 text-slate-500">${i['Previsão Entrega'] || i.Status}</td>
                                <td class="p-6 font-extrabold text-blue-600">${i['Valor Total']}</td>
                                <td class="p-6 text-center"><span class="bg-slate-100 text-slate-400 text-[10px] font-black px-3 py-1 rounded-lg">VER</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
        window.scrollTo({ top: 400, behavior: 'smooth' });
    }

    function abrirFicha(item) {
        const modal = document.getElementById('modal-detalhes');
        const conteudo = document.getElementById('conteudo-modal');
        const whatsMsg = encodeURIComponent(`Olá! Tenho interesse na unidade ${item.Unidade} do ${item.Empreendimento}.`);

        conteudo.innerHTML = `
            <div class="grid lg:grid-cols-2 h-full">
                <div class="bg-slate-50 p-8 md:p-12 flex flex-col justify-center">
                    <img src="${item['Foto Unidade']}" class="w-full h-64 md:h-80 object-cover rounded-[2rem] shadow-2xl mb-8" onerror="this.src='https://via.placeholder.com/600x400'">
                    <h2 class="text-3xl md:text-4xl font-black text-slate-900 uppercase">${item.Empreendimento}</h2>
                    <p class="text-slate-500 font-medium mt-2">${item['Endereço'] || ''}</p>
                </div>
                <div class="p-8 md:p-12 flex flex-col justify-between">
                    <div>
                        <span class="text-blue-500 font-black uppercase text-[10px] tracking-widest">Revenda Disponível</span>
                        <p class="text-4xl md:text-5xl font-black text-slate-900 mt-4 mb-2">${item['Valor Total']}</p>
                        <p class="text-xs text-slate-400 font-semibold mb-8 md:mb-10 uppercase">m²: ${item['m²'] || 'Consultar'}</p>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100">
                                <p class="text-[9px] font-bold text-slate-300
