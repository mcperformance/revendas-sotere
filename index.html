<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porta de Revendas | Sotere Negócios Imobiliários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-summary { transition: all 0.3s ease; border-radius: 2rem; border: 1px solid #e2e8f0; background: white; height: 100%; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
        .card-summary:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-blur { backdrop-filter: blur(12px); background-color: rgba(15, 23, 42, 0.7); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        tr:hover td { background-color: #f1f5f9 !important; cursor: pointer; }
    </style>
</head>
<body>

<header class="bg-white border-b border-slate-100 py-6 sticky top-0 z-50">
    <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-extrabold text-slate-800 uppercase">Porta de Revendas <span class="text-blue-600">Sotere</span></h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.3em] font-bold">Gestão Estratégica de Ativos</p>
        </div>
        <div id="status-header">
            <span id="total-geral" class="text-xs font-bold text-slate-500 bg-slate-100 px-4 py-2 rounded-full">Carregando estoque...</span>
        </div>
    </div>
</header>

<main class="container mx-auto px-6 py-8">
    <section class="mb-10 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="md:col-span-12 relative">
                <input type="text" id="busca-global" oninput="aplicarFiltros()" placeholder="Pesquise por nome, cidade ou construtora..." 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-600 text-sm rounded-2xl p-4 pl-12 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all font-medium">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            
            <div class="md:col-span-3">
                <select id="filtro-empreendimento" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Empreendimento</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <select id="filtro-construtora" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Construtora</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <select id="filtro-cidade" onchange="aplicarFiltros()" class="w-full bg-slate-50 border border-slate-200 text-slate-500 text-xs rounded-xl p-3 outline-none font-bold uppercase tracking-wider cursor-pointer">
                    <option value="">Cidade</option>
                </select>
            </div>

            <div class="md:col-span-3">
                <button onclick="resetarVista()" class="w-full h-full bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                    Limpar Filtros
                </button>
            </div>
        </div>
    </section>

    <div id="view-container"></div>
</main>

<div id="modal-detalhes" class="hidden fixed inset-0 z-[60] modal-blur flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-5xl max-h-[90vh] overflow-hidden rounded-[2.5rem] shadow-2xl relative">
        <button onclick="fecharModal()" class="absolute top-8 right-8 z-50 bg-slate-100 rounded-full p-2 hover:bg-slate-200 transition">
            <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div id="conteudo-modal" class="overflow-y-auto custom-scrollbar h-full"></div>
    </div>
</div>

<script>
    // SUBSTITUA PELO SEU LINK DO GOOGLE SHEETS (CSV)
    const LINK_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROTgHcXnaIQlwelJZknF-e_RAKvjPKgWeZVN2GSoajz1ORsCMfNWv1FwZGadV9c4gSfGHw29w3zRRL/pub?gid=0&single=true&output=csv'; 
    let todosImoveis = [];

    function carregarDados() {
        Papa.parse(LINK_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(r) {
                todosImoveis = r.data.filter(i => i.Empreendimento);
                document.getElementById('total-geral').innerText = `${todosImoveis.length} Unidades em Estoque`;
                popularFiltros();
                renderizarSumario(todosImoveis);
            }
        });
    }

    function popularFiltros() {
        const fEmp = document.getElementById('filtro-empreendimento');
        const fCons = document.getElementById('filtro-construtora');
        const fCid = document.getElementById('filtro-cidade');

        const nomes = [...new Set(todosImoveis.map(i => i.Empreendimento))].sort();
        const construtoras = [...new Set(todosImoveis.map(i => i.Construtora))].sort();
        const cidades = [...new Set(todosImoveis.map(i => i.Cidade))].sort();

        nomes.forEach(n => fEmp.innerHTML += `<option value="${n}">${n}</option>`);
        construtoras.forEach(c => fCons.innerHTML += `<option value="${c}">${c}</option>`);
        cidades.forEach(cid => fCid.innerHTML += `<option value="${cid}">${cid}</option>`);
    }

    function formatarNumero(str) {
        if (!str || str.trim() === "" || str.includes("---")) return null;
        const num = parseFloat(str.replace(/[^\d]/g, '')) / 100;
        return isNaN(num) ? null : num;
    }

    function renderizarSumario(items) {
        const container = document.getElementById('view-container');
        const agrupado = items.reduce((acc, curr) => {
            if (!acc[curr.Empreendimento]) {
                acc[curr.Empreendimento] = {
                    nome: curr.Empreendimento,
                    construtora: curr.Construtora,
                    cidade: curr.Cidade,
                    foto: curr['Foto Empreendimento'],
                    precos: [],
                    plantas: new Set(),
                    total: 0
                };
            }
            const valor = formatarNumero(curr['Valor Total']);
            if (valor !== null) acc[curr.Empreendimento].precos.push(valor);
            if (curr.Metragem) acc[curr.Empreendimento].plantas.add(curr.Metragem + 'm²');
            acc[curr.Empreendimento].total++;
            return acc;
        }, {});

        container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8";
        container.innerHTML = Object.values(agrupado).map(p => {
            const temPreco = p.precos.length > 0;
            const min = temPreco ? Math.min(...p.precos).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }) : "Sob Consulta";
            const max = temPreco ? Math.max(...p.precos).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }) : "";
            const faixa = (max && max !== min) ? `${min} a ${max}` : min;

            return `
            <div class="card-summary" onclick="verUnidades('${p.nome}')">
                <div class="h-44 bg-cover bg-center" style="background-image: url('${p.foto}')"></div>
                <div class="p-8 flex flex-col flex-grow">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">${p.construtora}</span>
                        <span class="text-slate-400 text-[10px] font-bold">${p.total} Unid.</span>
                    </div>
                    <h3 class="text-xl font-extrabold text-slate-800 leading-tight mb-1">${p.nome}</h3>
                    <p class="text-slate-400 text-xs font-medium mb-6">${p.cidade}</p>
                    <div class="mt-auto pt-6 border-t border-slate-50 space-y-4">
                        <div>
                            <p class="text-[9px] font-bold text-slate-300 uppercase mb-1">Plantas</p>
                            <p class="text-xs font-bold text-slate-600">${Array.from(p.plantas).sort().join(' | ')}</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-300 uppercase mb-1">Valor Total</p>
                            <p class="text-sm font-extrabold text-slate-800">${faixa}</p>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function verUnidades(nome) {
        // Ao clicar no card, filtramos e mostramos a tabela
        const filtrados = todosImoveis.filter(i => i.Empreendimento === nome);
        const container = document.getElementById('view-container');
        container.className = "bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden";
        container.innerHTML = `
            <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h2 class="text-xl font-extrabold text-slate-800 uppercase">${nome}</h2>
                <button onclick="resetarVista()" class="text-blue-600 text-xs font-bold uppercase tracking-widest">← Voltar</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="p-6">Unidade</th>
                            <th class="p-6">Andar</th>
                            <th class="p-6">Planta</th>
                            <th class="p-6">Previsão Entrega</th>
                            <th class="p-6">Valor Total</th>
                            <th class="p-6 text-center">Ficha</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtrados.map(i => `
                            <tr class="border-b border-slate-50" onclick='abrirFicha(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
                                <td class="p-6 font-bold text-slate-700">${i.Unidade}</td>
                                <td class="p-6 text-slate-500">${i.Andar}º</td>
                                <td class="p-6 text-slate-500">${i.Metragem}m²</td>
                                <td class="p-6 text-slate-500">${i['Previsão Entrega'] || i.Status}</td>
                                <td class="p-6 font-extrabold text-blue-600">${i['Valor Total']}</td>
                                <td class="p-6 text-center"><span class="bg-slate-100 text-slate-400 text-[10px] font-black px-3 py-1 rounded-lg">VER</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
    }

    function abrirFicha(item) {
        const modal = document.getElementById('modal-detalhes');
        const conteudo = document.getElementById('conteudo-modal');
        const whatsMsg = encodeURIComponent(`Olá! Tenho interesse na unidade ${item.Unidade} do ${item.Empreendimento}.`);

        conteudo.innerHTML = `
            <div class="grid lg:grid-cols-2 h-full">
                <div class="bg-slate-50 p-12 flex flex-col justify-center">
                    <img src="${item['Foto Unidade']}" class="w-full h-80 object-cover rounded-[2.5rem] shadow-2xl mb-8" onerror="this.src='https://via.placeholder.com/600x400'">
                    <h2 class="text-4xl font-black text-slate-900">${item.Empreendimento}</h2>
                    <p class="text-slate-500 font-medium mt-2">${item['Endereço']}</p>
                </div>
                <div class="p-12 flex flex-col justify-between">
                    <div>
                        <span class="text-blue-500 font-black uppercase text-[10px] tracking-widest">Revenda Disponível</span>
                        <p class="text-5xl font-black text-slate-900 mt-4 mb-2">${item['Valor Total']}</p>
                        <p class="text-sm text-slate-400 font-semibold mb-10">m²: ${item['m²']}</p>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <p class="text-[10px] font-bold text-slate-300 uppercase mb-1">Unidade/Andar</p>
                                <p class="text-xl font-black text-slate-700">${item.Unidade} (${item.Andar}º)</p>
                            </div>
                            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <p class="text-[10px] font-bold text-slate-300 uppercase mb-1">Metragem</p>
                                <p class="text-xl font-black text-slate-700">${item.Metragem}m²</p>
                            </div>
                        </div>

                        <div class="mt-8 pt-8 border-t border-slate-100 grid grid-cols-2 gap-8">
                            <div>
                                <p class="text-[10px] font-bold text-slate-300 uppercase mb-2">Ato Previsto</p>
                                <p class="text-2xl font-black text-emerald-600">${item.Ato || 'Consultar'}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-300 uppercase mb-2">Fluxo Restante</p>
                                <p class="text-2xl font-black text-blue-600">${item.Entrega || 'Consultar'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-12">
                        <a href="https://wa.me/5511991183368?text=${whatsMsg}" target="_blank" 
                           class="flex items-center justify-center gap-3 w-full py-5 bg-[#25D366] text-white rounded-2xl font-black uppercase text-xs tracking-widest hover:opacity-90 transition shadow-xl shadow-emerald-100">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Tenho Interesse
                        </a>
                    </div>
                </div>
            </div>`;
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function fecharModal() {
        document.getElementById('modal-detalhes').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    function aplicarFiltros() {
        const busca = document.getElementById('busca-global').value.toLowerCase();
        const selEmp = document.getElementById('filtro-empreendimento').value;
        const selCons = document.getElementById('filtro-construtora').value;
        const selCid = document.getElementById('filtro-cidade').value;

        const filtrados = todosImoveis.filter(i => {
            const matchesBusca = !busca || (i.Empreendimento + i.Cidade + i.Construtora).toLowerCase().includes(busca);
            const matchesEmp = !selEmp || i.Empreendimento === selEmp;
            const matchesCons = !selCons || i.Construtora === selCons;
            const matchesCid = !selCid || i.Cidade === selCid;
            return matchesBusca && matchesEmp && matchesCons && matchesCid;
        });

        // Se filtrar por um empreendimento específico no seletor, abre direto a tabela
        if (selEmp) verUnidades(selEmp);
        else renderizarSumario(filtrados);
    }

    function resetarVista() {
        document.getElementById('busca-global').value = "";
        document.getElementById('filtro-empreendimento').value = "";
        document.getElementById('filtro-construtora').value = "";
        document.getElementById('filtro-cidade').value = "";
        renderizarSumario(todosImoveis);
    }

    carregarDados();
</script>
</body>
</html>
